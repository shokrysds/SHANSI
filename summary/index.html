<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لیگ خوابگاه</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family: Vazirmatn, Tahoma, sans-serif;
    background: linear-gradient(180deg,#0f172a,#020617);
    color:white;
}

/* هدر اپلیکیشنی */
.header{
    padding:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

/* کارت اطلاعات */
.stats{
    display:flex;
    gap:10px;
    padding:15px;
    overflow-x:auto;
}

.stat{
    min-width:120px;
    background:rgba(255,255,255,0.06);
    padding:12px;
    border-radius:16px;
    text-align:center;
    font-size:13px;
}

/* کانتینر جدول */
.content{
    padding:15px;
    padding-bottom:90px;
}

.table-card{
    background:rgba(255,255,255,0.06);
    border-radius:20px;
    padding:10px;
    backdrop-filter:blur(12px);
    overflow:hidden;
}

/* اسکرول حرفه‌ای */
.table-wrapper{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    direction:ltr;
    border-radius:15px;
}

iframe{
    width:1400px;
    min-width:100%;
    height:55vh;
    border:none;
    border-radius:12px;
}

/* تب پایین مثل اپ */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:70px;
    background:rgba(15,23,42,0.95);
    backdrop-filter:blur(15px);
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid rgba(255,255,255,0.1);
}

.nav-btn{
    text-align:center;
    font-size:13px;
    color:#94a3b8;
    cursor:pointer;
}

.nav-btn.active{
    color:#22c55e;
    font-weight:bold;
}

/* فوتر کوچک */
.designer{
    text-align:center;
    font-size:11px;
    color:#64748b;
    margin-top:15px;
}

.designer a{
    color:#22c55e;
    text-decoration:none;
}

/* دسکتاپ */
@media(min-width:768px){
    iframe{
        height:60vh;
    }
}
</style>
</head>

<body>

<div class="header">
🏆 لیگ مسابقات خوابگاه
</div>

<div class="stats">
    <div class="stat">⚽ ۷ گروه FIFA</div>
    <div class="stat">🎮 ۶ گروه PES</div>
    <div class="stat">👥 هر گروه ۶ نفر</div>
</div>

<div class="content">

    <div id="fifa" class="table-card">
        <div class="table-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vShUN6WBkYMisxdlJg7uZt9HQPKs_-RHwfF5C36S9eGNq8ew9651x8pUTYlrY_T2GicZJwa5g-qbfoe/pubhtml?widget=true&headers=false"></iframe>
        </div>
    </div>

    <div id="pes" class="table-card" style="display:none;">
        <div class="table-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlfWWQQW0rd_MWKaHyx1Ao8erF0xICqVmj7dgMUTi7eTZ4vY1lnV2zFnCIqZUSH_0_fzwiMIlgFpxh/pubhtml?widget=true&headers=false"></iframe>
        </div>
    </div>

    <div class="designer">
        طراحی سایت: <strong>محمد شکری</strong> |
        📞 <a href="tel:+989185858816">09185858816</a> |
        ✈️ <a href="https://t.me/Mshokrytums">تلگرام</a>
    </div>

</div>

<div class="bottom-nav">
    <div class="nav-btn active" onclick="switchTab('fifa',this)">⚽<br>FIFA</div>
    <div class="nav-btn" onclick="switchTab('pes',this)">🎮<br>PES</div>
</div>

<script>
function switchTab(tab,btn){
    document.getElementById('fifa').style.display="none";
    document.getElementById('pes').style.display="none";

    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

    document.getElementById(tab).style.display="block";
    btn.classList.add('active');
}
</script>

</body>
</html>
