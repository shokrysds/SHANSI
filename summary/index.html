<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقات خوابگاه</title>

<style>
body{
    font-family:tahoma;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:40px;
    font-size:28px;
}

.section{
    margin-bottom:60px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    margin-bottom:25px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.01);
}

iframe{
    width:100%;
    height:650px;
    border:none;
    border-radius:10px;
}

.button{
    display:inline-block;
    padding:10px 20px;
    background:#22c55e;
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    margin-top:15px;
}

.button:hover{
    background:#16a34a;
}
</style>
</head>

<body>

<h1>🎮 مسابقات FIFA & PES خوابگاه</h1>

<div class="section">
    <div class="card">
        <h2>⚽ جدول مسابقات FIFA</h2>
        <iframe src="https://docs.google.com/spreadsheets/d/1TaW7HboyCbmq8uywcL5yRd5n4Oivh9j2/preview"></iframe>
        <br>
        <a class="button" href="https://docs.google.com/spreadsheets/d/1TaW7HboyCbmq8uywcL5yRd5n4Oivh9j2" target="_blank">
        مشاهده در گوگل شیت
        </a>
    </div>
</div>

<div class="section">
    <div class="card">
        <h2>🎮 جدول مسابقات PES</h2>
        <iframe src="https://docs.google.com/spreadsheets/d/1u6Ve4WY4xaJgR6b1gRHrixuM5SqPg8er/preview"></iframe>
        <br>
        <a class="button" href="https://docs.google.com/spreadsheets/d/1u6Ve4WY4xaJgR6b1gRHrixuM5SqPg8er" target="_blank">
        مشاهده در گوگل شیت
        </a>
    </div>
</div>

</body>
</html>
