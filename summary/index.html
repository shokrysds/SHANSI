<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 جدول مسابقات خوابگاه</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Tahoma, sans-serif;
    background: #0f172a;
    color: white;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #22c55e;
}

/* تب */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.tab {
    padding: 10px 24px;
    background: #1e293b;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.tab.active {
    background: #22c55e;
    color: black;
}

/* جدول */
.table-container {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    padding: 10px;
    border: 1px solid #334155;
    text-align: center;
}

th {
    background: #0f172a;
    font-size: 16px;
}

tr:nth-child(even) {
    background: #1e293b;
}
</style>
</head>

<body>

<h1>🏆 جدول مسابقات لیگ خوابگاه</h1>

<div class="tabs">
    <div class="tab active" onclick="loadTable('fifa', this)">⚽ FIFA</div>
    <div class="tab" onclick="loadTable('pes', this)">🎮 PES</div>
</div>

<div class="table-container">
    <table id="table">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script>
const BASE_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrSYYw6J6txfDAYPTbgVKFEequDPqxFH7NK-Q1_BxxVxsITJFw2eSPIrTCpgX3ysZJjyY38Rbsrez26JB6JlNAXuX322GCW6AM2GoaEkSS8n5AnoWAg34N2miDiCJi6L2nQB1vyzPKc-lbtig2vK1igwP4qIa03qgV3lHc3gYG5OAGggEMGCmWj1YQudFkqTtQ5FEj4nmmxgcwd3svrh2fKS0ptSy04cQFRkcmfUJvc6h-b4hgC6KwdKngdPFZZb3ZR7-B5DjJEJkVQb_0pssLVNEzx6fA&lib=Mig0a9Nliy9vWIkpUn2HTypisBMFTIqfn";

async function loadTable(type, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    try {
        const url = ${BASE_URL}&type=${type};
        const res = await fetch(url);
        const json = await res.json();

        if (!json || !Array.isArray(json)) {
            console.error("داده معتبر نیست:", json);
            return;
        }

        renderTable(json);
    } catch (err) {
        console.error("خطا در خواندن جدول:", err);
    }
}

function renderTable(data) {
    const table = document.getElementById("table");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    if (data.length === 0) return;

    // ستون‌ها (از اولین سطر)
    const headers = Object.keys(data[0]);
    const trh = document.createElement("tr");
    headers.forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        trh.appendChild(th);
    });
    thead.appendChild(trh);

    // سطرها
    data.forEach(row => {
        const tr = document.createElement("tr");
        headers.forEach(col => {
            const td = document.createElement("td");
            td.textContent = row[col] ?? "";
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
}

// بارگذاری اولیه
loadTable('fifa', document.querySelector('.tab'));
</script>

</body>
</html>
