<html lang="fa" dir="rtl">

body {
    margin: 0;

    color: white;
}

/* عنوان */
h1 {
    text-align: center;
    color: #22c55e;
}

/* تب‌ها */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

.tab {
    padding: 12px 24px;
    background: #1e293b;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
}

.tab.active {
    background: #22c55e;
    color: black;
}

/* جدول */
.table-container {
    overflow-x: auto;
    background: #1e293b;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 25px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #334155;
    text-align: center;
}

th {
    background: #0f172a;
}

/* خلاصه گروه */
.summary-container {
    background: #1e293b;
    border-radius: 12px;
    padding: 10px;
}

.summary-title {
    text-align: center;
    color: #22c55e;
    margin-bottom: 10px;
}

.hidden { display: none; }
</style>
</head>

<body>

<h1>🏆 لیگ مسابقات خوابگاه</h1>

<div class="tabs">
    <div class="tab active" onclick="load('fifa', this)">⚽ FIFA</div>
    <div class="tab" onclick="load('pes', this)">🎮 PES</div>
</div>

<div class="table-container">
    <table id="table">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<div class="summary-container">
    <h3 class="summary-title">📊 خلاصه گروه‌ها</h3>
    <table id="summary">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

async function load(type, btn){
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    try {
        const res = await fetch(BASE_URL + "?type=" + type);
        const json = await res.json();

        if (!json || json.status === "error") {
            console.error(json?.message || "خطا");
            return;
        }

        renderTable(json.data);
        renderSummary(json.data);
    } catch (err) {
        console.error(err);
    }
}

/* ===== جدول اصلی ===== */
function renderTable(data){
    const table = document.getElementById("table");
    const thead = table.querySelector("thead");
    const tbody = table.querySelector("tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    if (!data || data.length === 0) return;

    const headers = Object.keys(data[0]);

    // header
    const tr = document.createElement("tr");
    headers.forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        tr.appendChild(th);
    });
    thead.appendChild(tr);

            const td = document.createElement("td");
            td.textContent = row[col] ?? "";
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
}
