<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 لیگ مسابقات خوابگاه</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Tahoma, sans-serif;
    background: #0f172a;
    color: white;
}

/* اطلاعات لیگ */
.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
}

.info-card {
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

/* تب‌ها */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

.tab {
    padding: 12px 24px;
    background: #1e293b;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
}

.tab.active {
    background: #22c55e;
    color: black;
}

/* کارت جدول */
.card {
    background: #1e293b;
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

iframe {
    width: 100%;
    height: 650px;
    border: none;
    border-radius: 10px;
}

/* فوتر (طراح سایت) */
.footer {
    margin-top: 30px;
    text-align: center;
    font-size: 14px;
    color: #94a3b8;
}

.footer a {
    color: #22c55e;
    text-decoration: none;
}
</style>
</head>

<body>

<h1 style="text-align:center;color:#22c55e;">🏆 لیگ مسابقات خوابگاه</h1>

<div class="info-grid">
    <div class="info-card">⚽ FIFA: ۷ گروه</div>
    <div class="info-card">🎮 PES: ۶ گروه</div>
    <div class="info-card">👥 هر گروه ۶ نفر</div>
    <div class="info-card">📊 جدول لیگ</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="show('fifa', this)">⚽ FIFA</div>
    <div class="tab" onclick="show('pes', this)">🎮 PES</div>
</div>

<div id="fifa" class="card">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vShUN6WBkYMisxdlJg7uZt9HQPKs_-RHwfF5C36S9eGNq8ew9651x8pUTYlrY_T2GicZJwa5g-qbfoe/pubhtml?widget=true&headers=false"></iframe>
</div>

<div id="pes" class="card hidden">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlfWWQQW0rd_MWKaHyx1Ao8erF0xICqVmj7dgMUTi7eTZ4vY1lnV2zFnCIqZUSH_0_fzwiMIlgFpxh/pubhtml?widget=true&headers=false"></iframe>
</div>

<!-- فوتر (طراح سایت) -->
<div class="footer">
    <p>طراح سایت: <strong>محمد شکری</strong></p>
    <p>دانشجوی پرستاری - دانشگاه علوم پزشکی تهران</p>
    <p>📞 <a href="tel:+989185858816">+989185858816</a></p>
    <p>✈️ <a href="https://t.me/Mshokrytums" target="_blank">تلگرام</a></p>
</div>

<script>
function show(tab, btn){
    document.getElementById('fifa').classList.add('hidden');
    document.getElementById('pes').classList.add('hidden');

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    document.getElementById(tab).classList.remove('hidden');
}
</script>

</body>
</html>
