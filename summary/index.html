<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 لیگ مسابقات خوابگاه</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Tahoma, sans-serif;
    background: #0f172a;
    color: white;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #22c55e;
}

/* تب‌ها */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.tab {
    padding: 12px 24px;
    background: #1e293b;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.tab.active {
    background: #22c55e;
    color: black;
}

/* کارت جدول */
.card {
    background: #1e293b;
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

iframe {
    width: 100%;
    height: 650px;
    border: none;
    border-radius: 10px;
}

/* مخفی/نمایش */
.hidden {
    display: none;
}

/* اطلاعات بالای جدول */
.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
}

.info-card {
    background: #1e293b;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🏆 لیگ مسابقات خوابگاه</h1>

<div class="info-grid">
    <div class="info-card">⚽ FIFA: ۷ گروه</div>
    <div class="info-card">🎮 PES: ۶ گروه</div>
    <div class="info-card">👥 هر گروه ۶ نفر</div>
    <div class="info-card">📊 جدول لیگ</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="show('fifa', this)">⚽ FIFA</div>
    <div class="tab" onclick="show('pes', this)">🎮 PES</div>
</div>

<div id="fifa" class="card">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSwUcveo_Wl7EjBGiLZI7EX8nRg7PW8q-YPUT_LINK/pubhtml?widget=true&headers=false"></iframe>
</div>

<div id="pes" class="card hidden">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlfWWQQW0rd_MWKaHyx1Ao8erF0xICqVmj7dgMUTi7eTZ4vY1lnV2zFnCIqZUSH_0_fzwiMIlgFpxh/pubhtml?widget=true&headers=false"></iframe>
</div>

<script>
function show(tab, btn){
    document.getElementById('fifa').classList.add('hidden');
    document.getElementById('pes').classList.add('hidden');

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    document.getElementById(tab).classList.remove('hidden');
}
</script>

</body>
</html>
