<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 جدول مسابقات خوابگاه</title>

<style>
body {
    font-family: Tahoma;
    background: #0f172a;
    color: white;
    padding: 20px;
}

h1 {
    text-align: center;
}

#search {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-bottom: 15px;
}

.table-container {
    background: #1e293b;
    padding: 10px;
    border-radius: 12px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #334155;
    text-align: center;
}

th {
    background: #0f172a;
}

tr:nth-child(even) {
    background: #1e293b;
}
</style>
</head>

<body>

<h1>🏆 جدول مسابقات</h1>

<input type="text" id="search" placeholder="🔎 جستجو..." onkeyup="filterTable()">

<div class="table-container">
    <table id="table">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSlfWWQQW0rd_MWKaHyx1Ao8erF0xICqVmj7dgMUTi7eTZ4vY1lnV2zFnCIqZUSH_0_fzwiMIlgFpxh/pub?output=csv";
const proxy = "https://corsproxy.io/?";

async function loadCSV() {
    try {
        const response = await fetch(proxy + encodeURIComponent(csvUrl));
        const data = await response.text();

        const rows = data.trim().split("\n").map(row => row.split(","));
        if (rows.length === 0) return;

        const table = document.getElementById("table");
        const thead = table.querySelector("thead");
        const tbody = table.querySelector("tbody");

        thead.innerHTML = "";
        tbody.innerHTML = "";

        // Header
        const headerRow = document.createElement("tr");
        rows[0].forEach(cell => {
            const th = document.createElement("th");
            th.textContent = cell;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // Body
        rows.slice(1).forEach(row => {
            const tr = document.createElement("tr");
            row.forEach(cell => {
                const td = document.createElement("td");
                td.textContent = cell;
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    } catch (err) {
        console.error("خطا در دریافت CSV:", err);
    }
}

function filterTable() {
    const input = document.getElementById("search").value.toLowerCase();
    const rows = document.querySelectorAll("#table tbody tr");

    rows.forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(input) ? "" : "none";
    });
}

loadCSV();
</script>

</body>
</html>
