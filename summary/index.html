<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لیگ مسابقات خوابگاه</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family: Vazirmatn, Tahoma, sans-serif;
    background:#0f172a;
    color:#e2e8f0;
}

/* هدر */
.header{
    padding:25px 20px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.header h1{
    font-size:22px;
    font-weight:600;
    letter-spacing:1px;
}

/* تب‌ها */
.tabs{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:20px;
}

.tab{
    padding:10px 25px;
    border-radius:30px;
    background:#1e293b;
    cursor:pointer;
    transition:0.3s;
    font-weight:500;
}

.tab.active{
    background:#22c55e;
    color:#000;
}

.tab:hover{
    background:#334155;
}

/* کانتینر جدول */
.container{
    padding:0 20px 40px;
}

.table-box{
    background:#111827;
    border-radius:20px;
    padding:15px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

/* اسکرول حرفه‌ای */
.table-wrapper{
    overflow-x:auto;
    overflow-y:hidden;
    border-radius:15px;
    direction:ltr;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
    cursor:grab;
}

.table-wrapper:active{
    cursor:grabbing;
}

/* اسکرول بار سفارشی */
.table-wrapper::-webkit-scrollbar{
    height:12px;
}

.table-wrapper::-webkit-scrollbar-thumb{
    background:#22c55e;
    border-radius:10px;
}

.table-wrapper::-webkit-scrollbar-track{
    background:#0f172a;
}

/* iframe */
iframe{
    width:1500px;
    min-width:100%;
    height:55vh;
    min-height:480px;
    border:none;
    border-radius:12px;
}

/* فوتر */
.footer{
    text-align:center;
    font-size:12px;
    padding:20px;
    color:#64748b;
}

.footer a{
    color:#22c55e;
    text-decoration:none;
}

/* ریسپانسیو */
@media(max-width:768px){
    iframe{
        width:1300px;
        height:50vh;
        min-height:420px;
    }

    .header h1{
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>🏆 لیگ مسابقات خوابگاه</h1>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('fifa',this)">⚽ FIFA</div>
    <div class="tab" onclick="switchTab('pes',this)">🎮 PES</div>
</div>

<div class="container">

    <div id="fifa" class="table-box">
        <div class="table-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vShUN6WBkYMisxdlJg7uZt9HQPKs_-RHwfF5C36S9eGNq8ew9651x8pUTYlrY_T2GicZJwa5g-qbfoe/pubhtml?widget=true&headers=false"></iframe>
        </div>
    </div>

    <div id="pes" class="table-box" style="display:none;">
        <div class="table-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlfWWQQW0rd_MWKaHyx1Ao8erF0xICqVmj7dgMUTi7eTZ4vY1lnV2zFnCIqZUSH_0_fzwiMIlgFpxh/pubhtml?widget=true&headers=false"></iframe>
        </div>
    </div>

</div>

<div class="footer">
    طراحی سایت: <strong>محمد شکری</strong> |
    📞 <a href="tel:+989185858816">09185858816</a> |
    ✈️ <a href="https://t.me/Mshokrytums">تلگرام</a>
</div>

<script>
function switchTab(tab,btn){
    document.getElementById('fifa').style.display="none";
    document.getElementById('pes').style.display="none";
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(tab).style.display="block";
    btn.classList.add('active');
}

/* Drag Scroll */
document.querySelectorAll('.table-wrapper').forEach(wrapper=>{
    let isDown=false,startX,scrollLeft;

    wrapper.addEventListener('mousedown',e=>{
        isDown=true;
        startX=e.pageX-wrapper.offsetLeft;
        scrollLeft=wrapper.scrollLeft;
    });

    wrapper.addEventListener('mouseleave',()=>isDown=false);
    wrapper.addEventListener('mouseup',()=>isDown=false);

    wrapper.addEventListener('mousemove',e=>{
        if(!isDown)return;
        e.preventDefault();
        const x=e.pageX-wrapper.offsetLeft;
        const walk=(x-startX)*1.5;
        wrapper.scrollLeft=scrollLeft-walk;
    });
});
</script></body>
</html>
