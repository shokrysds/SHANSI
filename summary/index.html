<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 لیگ مسابقات خوابگاه</title>

<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Tahoma, sans-serif;
    background: #0f172a;
    color: white;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #22c55e;
}

/* تب‌ها */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.tab-button {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    background: #1e293b;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.tab-button.active {
    background: #22c55e;
    color: black;
}

.tab-button:hover {
    opacity: 0.9;
}

/* کارت جدول */
.card {
    background: #1e293b;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

iframe {
    width: 100%;
    height: 650px;
    border: none;
    border-radius: 10px;
}

/* مخفی/نمایش */
.hidden {
    display: none;
}
</style>
</head>

<body>

<h1>🏆 جدول مسابقات لیگ خوابگاه</h1>

<div class="tabs">
    <button class="tab-button active" onclick="showTab('fifa')">⚽ FIFA</button>
    <button class="tab-button" onclick="showTab('pes')">🎮 PES</button>
</div>

<!-- جدول FIFA -->
<div id="fifa" class="card">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSwUcveo_Wl7EjBGiLZI7EX8nRg7PW8q-ZpOLGyJ9EeZnR23EuT0X-ldvYCA2jbiQ/pubhtml?widget=true&headers=false"></iframe>
    <br>
    <a style="display:inline-block;margin-top:10px;padding:10px 18px;background:#22c55e;color:black;border-radius:8px;text-decoration:none;font-weight:bold;"
       href="https://docs.google.com/spreadsheets/d/e/2PACX-1vSwUcveo_Wl7EjBGiLZI7EX8nRg7PW8q-ZpOLGyJ9EeZnR23EuT0X-ldvYCA2jbiQ/pubhtml"
       target="_blank">
       📄 مشاهده در گوگل شیت
    </a>
</div>

<!-- جدول PES -->
<div id="pes" class="card hidden">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlfWWQQW0rd_MWKaHyx1Ao8erF0xICqVmj7dgMUTi7eTZ4vY1lnV2zFnCIqZUSH_0_fzwiMIlgFpxh/pubhtml?widget=true&headers=false"></iframe>
    <br>
    <a style="display:inline-block;margin-top:10px;padding:10px 18px;background:#22c55e;color:black;border-radius:8px;text-decoration:none;font-weight:bold;"
       href="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlfWWQQW0rd_MWKaHyx1Ao8erF0xICqVmj7dgMUTi7eTZ4vY1lnV2zFnCIqZUSH_0_fzwiMIlgFpxh/pubhtml"
       target="_blank">
       📄 مشاهده در گوگل شیت
    </a>
</div>

<script>
function showTab(tab) {
    document.getElementById('fifa').classList.add('hidden');
    document.getElementById('pes').classList.add('hidden');

    document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));

    if (tab === 'fifa') {
        document.getElementById('fifa').classList.remove('hidden');
        document.querySelectorAll('.tab-button')[0].classList.add('active');
    } else {
        document.getElementById('pes').classList.remove('hidden');
        document.querySelectorAll('.tab-button')[1].classList.add('active');
    }
}
</script>

</body>
</html>
