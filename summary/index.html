<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لیگ مسابقات خوابگاه</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family: Vazirmatn, Tahoma, sans-serif;
    background:#0f172a;
    color:#e2e8f0;
}

/* هدر */
.header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.header h1{
    font-size:20px;
}

/* تب‌ها */
.tabs{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:15px;
}

.tab{
    padding:10px 24px;
    border-radius:28px;
    background:#1e293b;
    cursor:pointer;
}

.tab.active{
    background:#22c55e;
    color:#000;
}

/* کانتینر */
.container{
    padding:0 12px 20px;
}

/* باکس جدول */
.table-box{
    background:#111827;
    border-radius:16px;
    padding:8px;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

/* اسکرول حرفه‌ای */
.table-wrapper{
    width:100%;
    height:100vh; /* تمام ارتفاع */
    overflow-x:auto;
    overflow-y:auto;
    direction:ltr;
    -webkit-overflow-scrolling:touch;
    scroll-behavior:smooth;
    cursor:grab;
}

.table-wrapper:active{
    cursor:grabbing;
}

/* اسکرول بار */
.table-wrapper::-webkit-scrollbar{
    width:10px;
    height:10px;
}

.table-wrapper::-webkit-scrollbar-thumb{
    background:#22c55e;
    border-radius:10px;
}

.table-wrapper::-webkit-scrollbar-track{
    background:#0f172a;
}

/* iframe بزرگ ۱۰۰٪ */
iframe{
    width:100%;
    height:50%;
    border:none;
    border-radius:12px;
}

/* فوتر */
.footer{
    text-align:center;
    font-size:12px;
    padding:15px;
    color:#64748b;
}

.footer a{
    color:#22c55e;
    text-decoration:none;
}

/* دسکتاپ */
@media(min-width:768px){
    .table-wrapper{
        height:80vh;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>🏆 لیگ مسابقات خوابگاه</h1>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('fifa',this)">⚽ FIFA</div>
    <div class="tab" onclick="switchTab('pes',this)">🎮 PES</div>
</div>

<div class="container">

    <div id="fifa" class="table-box">
        <div class="table-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vShUN6WBkYMisxdlJg7uZt9HQPKs_-RHwfF5C36S9eGNq8ew9651x8pUTYlrY_T2GicZJwa5g-qbfoe/pubhtml?widget=true&headers=false"></iframe>
        </div>
    </div>

    <div id="pes" class="table-box" style="display:none;">
        <div class="table-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlfWWQQW0rd_MWKaHyx1Ao8erF0xICqVmj7dgMUTi7eTZ4vY1lnV2zFnCIqZUSH_0_fzwiMIlgFpxh/pubhtml?widget=true&headers=false"></iframe>
        </div>
    </div>

</div>

<div class="footer">
    طراحی سایت: <strong>محمد شکری</strong> |
    📞 <a href="tel:+989185858816">09185858816</a> |
    ✈️ <a href="https://t.me/Mshokrytums">تلگرام</a>
</div>

<script>
function switchTab(tab,btn){
    document.getElementById('fifa').style.display="none";
    document.getElementById('pes').style.display="none";
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(tab).style.display="block";
    btn.classList.add('active');
}

/* Drag Scroll */
document.querySelectorAll('.table-wrapper').forEach(wrapper=>{
    let isDown=false,startX,scrollLeft;

    wrapper.addEventListener('mousedown',e=>{
        isDown=true;
        startX=e.pageX-wrapper.offsetLeft;
        scrollLeft=wrapper.scrollLeft;
    });

    wrapper.addEventListener('mouseleave',()=>isDown=false);
    wrapper.addEventListener('mouseup',()=>isDown=false);

    wrapper.addEventListener('mousemove',e=>{
        if(!isDown)return;
        e.preventDefault();
        const x=e.pageX-wrapper.offsetLeft;
        const walk=(x-startX)*1.4;
        wrapper.scrollLeft=scrollLeft-walk;
    });

    // لمس موبایل
    wrapper.addEventListener('touchstart',e=>{
        startX=e.touches[0].pageX;
        scrollLeft=wrapper.scrollLeft;
    });wrapper.addEventListener('touchmove',e=>{
        const x=e.touches[0].pageX;
        const walk=(x-startX)*1.4;
        wrapper.scrollLeft=scrollLeft-walk;
    });
});
</script>

</body>
</html>
